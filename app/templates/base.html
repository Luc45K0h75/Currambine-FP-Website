<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currambine Family Practice</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>

        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand" href="{{ url_for('main.index') }}">
                    <div class="nav-logo">CFP</div>
                    Currambine Family Practice
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.services') }}">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.team') }}">Our Team</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.about') }}">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.contact') }}">Hours &amp; Location</a></li>
                    </ul>
                    <a href="tel:0893041120" class="nav-phone d-none d-lg-block">(08) 9304 1120</a>
                    <a href="{{ url_for('main.appointments') }}" class="btn btn-book ms-3">Book Online</a>
                </div>
            </div>
        </nav>

        <!-- Page content goes here -->
        {% block content %}{% endblock %}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
