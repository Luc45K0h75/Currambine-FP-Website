<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currambine Family Practice</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;1,700&display=swap" rel="stylesheet">
    </head>
    <body>

        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
 
                <a class="navbar-brand" href="{{ url_for('main.index') }}">
                    <div class="nav-logo">CFP</div>
                    Currambine Family Practice
                </a>
 
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>
 
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-4">
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if request.endpoint == 'main.services' }}" href="#services">Services</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if request.endpoint == 'main.team' }}" href="{{ url_for('main.team') }}">Our Team</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if request.endpoint == 'main.about' }}" href="{{ url_for('main.about') }}">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if request.endpoint == 'main.contact' }}" href="{{ url_for('main.contact') }}">Hours &amp; Location</a>
                        </li>
                    </ul>
 
                    <!-- Desktop: phone number -->
                    <a href="tel:0893041120" class="nav-phone d-none d-lg-block ms-auto me-3"><i class="bi bi-telephone me-2"></i>(08) 9304 1120</a>
                    <a href="https://automedsystems.com.au/ams/clinics/5041/ocean-keys-and-currambine-family-practice-clarkson-6030/doctors/loc/2" class="btn btn-book">Book Online</a>
 
                    <!-- Mobile: phone number inside collapsed menu -->
                    <a href="tel:0893041120" class="nav-mobile-phone d-lg-none">
                        <i class="bi bi-telephone me-2"></i>(08) 9304 1120
                    </a>
                </div>
 
            </div>
        </nav>

        <!-- Page content goes here -->
        {% block content %}
        
        {% endblock %}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
